name: Build and publish routing rules

on:
  schedule:
    # Every Thursday at 06:00 UTC
    - cron: '0 6 * * 4'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'config/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install Loyalsoldier/geoip CLI
        run: go install github.com/Loyalsoldier/geoip@latest

      - name: Install sing-box
        run: |
          SINGBOX_VERSION="1.11.0"
          curl -fsSL -o sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv "sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box" /usr/local/bin/
          sing-box version

      - name: Run build script
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh

      - name: Publish to release branch
        run: |
          cd output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "Update rules $(date -u +'%Y-%m-%d %H:%M UTC')"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin release
